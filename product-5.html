<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>미니멀 책장 - Nuage</title>
  <meta name="description" content="심플하고 모던한 디자인의 아동 책장, 미니멀 책장" />
</head>
<body>
  <header id="header">
    <div class="container nav-container">
      <a href="/" class="logo">Nuage.</a>
      <div class="nav-right" style="display: flex; align-items: center; gap: 3rem;">
        <ul class="nav-links">
          <li><a href="/">Home</a></li>
          <li><a href="/#collections">Collections</a></li>
        </ul>
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="메뉴 열기">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <div class="cart-icon" id="cartToggle" style="cursor: pointer; position: relative;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--text-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
          <span class="cart-badge" id="cartBadge">0</span>
        </div>
      </div>
    </div>
  </header>

  <main style="padding-top: 120px;">
    <div class="container product-detail-grid">
      <div class="product-gallery fade-up">
        <div class="main-image">
          <img src="/high_chair_minimalist_1775743035981.png" alt="미니멀 책장" id="mainProdImage"/>
        </div>
      </div>

      <div class="product-info-panel fade-up delay-100">
        <div class="breadcrumb"><a href="/">Home</a> / <a href="/#collections">수납</a> / 미니멀 책장</div>
        <h1 class="pdp-title">미니멀 책장</h1>
        <div class="pdp-price">₩ 240,000</div>
        <p class="pdp-desc">심플하고 모던한 디자인의 아동 책장입니다. 2단과 3단 중 공간에 맞게 선택할 수 있으며, 전면 디스플레이 선반으로 아이가 스스로 책을 고를 수 있도록 도와줍니다.</p>

        <div class="pdp-options">
          <div class="option-group">
            <label>소재</label>
            <div>파인우드 원목 + MDF</div>
          </div>
          <div class="option-group">
            <label>사용 연령</label>
            <div>2세 ~ 10세</div>
          </div>
          <div class="option-group">
            <label>크기 (2단)</label>
            <div>W700 × D300 × H600 mm</div>
          </div>
          <div class="option-group">
            <label>크기 (3단)</label>
            <div>W700 × D300 × H900 mm</div>
          </div>
          <div class="option-group" style="margin-top: 1rem;">
            <label>단 수</label>
            <div class="option-select-group">
              <button class="option-select-btn active" data-price="240000" data-label="2단">2단 — ₩240,000</button>
              <button class="option-select-btn" data-price="310000" data-label="3단">3단 — ₩310,000</button>
            </div>
          </div>
        </div>

        <div class="purchase-actions">
          <div class="quantity-selector">
            <button id="qtyMinus">-</button>
            <input type="number" id="qtyInput" value="1" min="1" max="10" readonly />
            <button id="qtyPlus">+</button>
          </div>
          <button class="btn btn-full add-to-cart-large" data-id="5" data-name="미니멀 책장 (2단)" data-price="240000" data-img="/high_chair_minimalist_1775743035981.png">
            장바구니 담기
          </button>
        </div>

        <div class="accordion">
          <div class="accordion-item">
            <div class="accordion-title">배송 및 조립 정보 <span>+</span></div>
          </div>
          <div class="accordion-item">
            <div class="accordion-title">교환 / 반품 안내 <span>+</span></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Cart Sidebar -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h3>장바구니</h3>
      <button id="closeCart" class="close-cart">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>합계:</span>
        <span id="cartTotalPrice">₩ 0</span>
      </div>
      <button class="btn btn-full">주문하기</button>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Quick View Modal -->
  <div class="quick-view-modal" id="quickViewModal"></div>

  <!-- Mobile Menu -->
  <div class="mobile-menu-overlay" id="mobileMenuOverlay"></div>
  <nav class="mobile-menu" id="mobileMenu">
    <button class="mobile-menu-close" id="mobileMenuClose"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"></path></svg></button>
    <ul class="mobile-menu-links">
      <li><a href="/">Home</a></li>
      <li><a href="/#collections">Collections</a></li>
    </ul>
  </nav>

  <div class="scroll-progress" id="scrollProgress"></div>
  <button class="back-to-top" id="backToTop" aria-label="맨 위로">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 15l-6-6-6 6"></path></svg>
  </button>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
